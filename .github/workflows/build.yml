name: Build Extension-Kit

on:
  push:
    branches: [main, master, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Package Extension-Kit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package extension-kit
        run: |
          EK_SRC="sliver-web/backend/bin/adaptix-plugin/official/extension-kit"
          DEST="dist/extension-kit"
          mkdir -p "$DEST"

          # 复制整个 extension-kit 目录结构（_bin、.axs、_img）
          cd "$EK_SRC"

          # 复制所有 _bin 目录（预编译的 .o 文件）
          find . -name "_bin" -type d | while read bindir; do
            relpath="${bindir#./}"
            mkdir -p "$OLDPWD/$DEST/$relpath"
            cp -r "$bindir/"* "$OLDPWD/$DEST/$relpath/"
          done

          # 复制所有 .axs 脚本
          find . -name "*.axs" | while read f; do
            dir=$(dirname "$f")
            reldir="${dir#./}"
            mkdir -p "$OLDPWD/$DEST/$reldir"
            cp "$f" "$OLDPWD/$DEST/$reldir/"
          done

          # 复制 _img 目录
          if [ -d "_img" ]; then
            cp -r _img "$OLDPWD/$DEST/"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-kit
          path: dist/extension-kit/
          retention-days: 30

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-kit
          path: extension-kit/

      - name: Create release archive
        run: |
          cd extension-kit
          zip -r ../extension-kit.zip .
          cd ..
          tar -czvf extension-kit.tar.gz -C extension-kit .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            extension-kit.zip
            extension-kit.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
