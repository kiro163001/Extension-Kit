name: Build Extension-Kit

on:
  push:
    branches: [main, master, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build BOF Modules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone Extension-Kit source
        run: git clone --depth 1 https://github.com/Adaptix-Framework/Extension-Kit.git /tmp/extension-kit

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            mingw-w64-tools \
            make cmake

      - name: Build all BOF modules
        run: make
        working-directory: /tmp/extension-kit

      - name: Collect build artifacts
        run: |
          SRC="/tmp/extension-kit"
          DEST="dist/extension-kit"
          mkdir -p "$DEST"

          cd "$SRC"

          # 递归查找所有 _bin 目录，保持相对路径复制
          find . -name "_bin" -type d | while read bindir; do
            relpath="${bindir#./}"
            mkdir -p "$OLDPWD/$DEST/$relpath"
            cp -r "$bindir/"* "$OLDPWD/$DEST/$relpath/"
          done

          # 复制 axs 脚本文件
          find . -name "*.axs" | while read f; do
            dir=$(dirname "$f")
            reldir="${dir#./}"
            mkdir -p "$OLDPWD/$DEST/$reldir"
            cp "$f" "$OLDPWD/$DEST/$reldir/"
          done

          # 复制 _img 目录
          if [ -d "_img" ]; then
            cp -r _img "$OLDPWD/$DEST/"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-kit
          path: dist/extension-kit/
          retention-days: 30

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-kit
          path: extension-kit/

      - name: Create release archive
        run: |
          cd extension-kit
          zip -r ../extension-kit.zip .
          cd ..
          tar -czvf extension-kit.tar.gz -C extension-kit .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            extension-kit.zip
            extension-kit.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
